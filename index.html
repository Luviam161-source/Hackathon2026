<!DOCTYPE html>
<html> 
<head>
    <title>Flashcards {{topic}}</title>
    <link href="/static/styles.css" rel="stylesheet" type="text/css">
</head>
<body>
    <h1>Flashcards</h1>
    <h2> {{topic}}</h2>
    <h2>{{level}}</h2>

    {%for card in flashcard%}
    <div class="caja">
        <div class="flashcard">
            <p>{{pregunta}}</p>
        </div><br><br>
        <div class="respuestaParent flashcard">
            <div class="respuestaChild">
                <p> {{respuesta}}</p>
            </div>
        </div>
    </div>    
    {%end for%}
</body>
</html>
